<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">

  <!-- Card de login -->
  <div class="w-full max-w-md">

    <!-- Logo e título -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">RHIANA</h1>
      <p class="text-blue-300 mt-1 text-sm">Sistema de Gestão de Recursos Humanos</p>
    </div>

    <!-- Formulário -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-slate-800 mb-6">Entrar na sua conta</h2>

      <!-- Erro -->
      @if (error()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
          <svg class="w-4 h-4 text-red-500 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
          <span class="text-sm text-red-700">{{ error() }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="seu@email.com"
            class="input-field"
            [disabled]="loading()"
            autocomplete="email"
          />
        </div>

        <!-- Senha -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            class="input-field"
            [disabled]="loading()"
            autocomplete="current-password"
          />
        </div>

        <!-- Botão -->
        <button
          type="submit"
          class="btn-primary w-full flex items-center justify-center gap-2 py-2.5"
          [disabled]="loading()"
        >
          @if (loading()) {
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            <span>Entrando...</span>
          } @else {
            <span>Entrar</span>
          }
        </button>
      </form>

      <!-- Credenciais de teste -->
      <div class="mt-6 p-3 bg-slate-50 rounded-lg border border-slate-200">
        <p class="text-xs font-medium text-slate-500 mb-2">Credenciais de teste:</p>
        <p class="text-xs text-slate-600">📧 admin&#64;rhiana.com</p>
        <p class="text-xs text-slate-600">🔑 Admin&#64;2025</p>
      </div>
    </div>

    <!-- Rodapé -->
    <p class="text-center text-slate-500 text-xs mt-6">
      RHIANA © 2025 — UTFPR Cornélio Procópio
    </p>
  </div>
</div>
