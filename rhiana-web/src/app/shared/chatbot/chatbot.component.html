<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">

  <!-- Janela do chat -->
  <div
    *ngIf="isOpen()"
    class="w-80 sm:w-96 bg-white rounded-2xl shadow-2xl border border-slate-200 flex flex-col overflow-hidden"
    style="height: 480px;">

    <!-- Header do chat -->
    <div class="bg-gradient-to-r from-blue-700 to-blue-900 px-4 py-3 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-white bg-opacity-20 rounded-xl flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <div>
          <p class="text-white text-sm font-semibold">RHIANA</p>
          <div class="flex items-center gap-1">
            <div class="w-1.5 h-1.5 bg-green-400 rounded-full"></div>
            <p class="text-blue-200 text-xs">Online</p>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button
          (click)="clearChat()"
          class="p-1.5 text-blue-200 hover:text-white hover:bg-white hover:bg-opacity-10 rounded-lg transition-colors"
          title="Limpar conversa">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
        <button
          (click)="toggleChat()"
          class="p-1.5 text-blue-200 hover:text-white hover:bg-white hover:bg-opacity-10 rounded-lg transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mensagens -->
    <div
      #messagesContainer
      class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">

      <div *ngFor="let msg of messages()" class="flex"
        [class.justify-end]="msg.role === 'user'"
        [class.justify-start]="msg.role === 'assistant'">

        <!-- Avatar assistente -->
        <div *ngIf="msg.role === 'assistant'" class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center shrink-0 mr-2 mt-1">
          <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z"/>
          </svg>
        </div>

        <div
          class="max-w-xs px-3 py-2 rounded-2xl text-sm"
          [class.bg-blue-600]="msg.role === 'user'"
          [class.text-white]="msg.role === 'user'"
          [class.rounded-br-sm]="msg.role === 'user'"
          [class.bg-white]="msg.role === 'assistant'"
          [class.text-slate-700]="msg.role === 'assistant'"
          [class.shadow-sm]="msg.role === 'assistant'"
          [class.rounded-bl-sm]="msg.role === 'assistant'"
          [innerHTML]="formatMessage(msg.content)">
        </div>
      </div>

      <!-- Digitando -->
      <div *ngIf="loading()" class="flex justify-start">
        <div class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center shrink-0 mr-2 mt-1">
          <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z"/>
          </svg>
        </div>
        <div class="bg-white shadow-sm px-4 py-3 rounded-2xl rounded-bl-sm flex items-center gap-1">
          <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
          <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
          <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
        </div>
      </div>

    </div>

    <!-- Input -->
    <div class="px-3 py-3 border-t border-slate-200 bg-white shrink-0">
      <div class="flex items-center gap-2">
        <input
          type="text"
          [(ngModel)]="inputMessage"
          (keydown)="onKeyDown($event)"
          placeholder="Digite sua mensagem..."
          [disabled]="loading()"
          class="flex-1 px-3 py-2 bg-slate-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-60"/>
        <button
          (click)="sendMessage()"
          [disabled]="!inputMessage.trim() || loading()"
          class="w-9 h-9 bg-blue-600 hover:bg-blue-700 text-white rounded-xl flex items-center justify-center transition-colors disabled:opacity-50 shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
      <p class="text-xs text-slate-400 text-center mt-2">Enter para enviar · IA local</p>
    </div>

  </div>

  <!-- Botão flutuante -->
  <button
    (click)="toggleChat()"
    class="w-14 h-14 bg-gradient-to-br from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 text-white rounded-2xl shadow-lg hover:shadow-xl transition-all duration-200 flex items-center justify-center">
    <svg *ngIf="!isOpen()" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
    </svg>
    <svg *ngIf="isOpen()" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>

</div>
