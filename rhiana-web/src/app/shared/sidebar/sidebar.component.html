<aside
  class="flex flex-col w-64 bg-gradient-to-b from-blue-900 to-blue-950 text-white shrink-0 h-screen sticky top-0
         fixed lg:sticky inset-y-0 left-0 z-30
         transition-all duration-300 ease-in-out"
  [style.width]="isOpen ? '256px' : '0px'"
  [class.translate-x-0]="isOpen"
  [class.-translate-x-full]="!isOpen"
  [class.lg:translate-x-0]="isOpen"
  [class.lg:-translate-x-full]="!isOpen"
  [class.lg:w-0]="!isOpen"
  [class.overflow-hidden]="!isOpen">

  <!-- Logo -->
  <div class="flex items-center gap-3 px-6 py-5 border-b border-white border-opacity-10">
    <div class="w-9 h-9 bg-blue-500 rounded-xl flex items-center justify-center shrink-0">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </div>
    <div>
      <h1 class="font-bold text-lg leading-none">RHIANA</h1>
      <p class="text-blue-300 text-xs">Gestão de RH</p>
    </div>
  </div>

  <!-- Usuário logado -->
  <div class="px-4 py-4 border-b border-white border-opacity-10">
    <div class="flex items-center gap-3 bg-white bg-opacity-10 rounded-xl px-3 py-2.5">
      <div class="w-8 h-8 bg-blue-400 rounded-full flex items-center justify-center text-sm font-bold shrink-0">
        {{ authService.currentUser()?.name?.charAt(0)?.toUpperCase() }}
      </div>
      <div class="min-w-0">
        <p class="text-sm font-medium truncate">{{ authService.currentUser()?.name }}</p>
        <p class="text-xs text-blue-300 capitalize">{{ authService.currentUser()?.role }}</p>
      </div>
    </div>
  </div>

  <!-- Navegação -->
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <ng-container *ngFor="let item of filteredNavItems">
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-white bg-opacity-20 text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-blue-100 hover:bg-white hover:bg-opacity-10 hover:text-white transition-all duration-200 text-sm font-medium"
        (click)="onNavClick()">

        <svg *ngIf="item.icon === 'home'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>

        <svg *ngIf="item.icon === 'requests'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>

        <svg *ngIf="item.icon === 'rh'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>

        <svg *ngIf="item.icon === 'reports'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3v18h18" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 14v6M12 10v10M17 6v14" />
        </svg>

        <svg *ngIf="item.icon === 'timesheet'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>

        <svg *ngIf="item.icon === 'admin'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>

        <svg *ngIf="item.icon === 'parameters'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
        </svg>

        <svg *ngIf="item.icon === 'myreport'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>

        <svg *ngIf="item.icon === 'company-report'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3v18h18M7 14v4m4-8v8m4-12v12"/>
        </svg>

        <svg *ngIf="item.icon === 'periodos'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>

        <svg *ngIf="item.icon === 'feriados'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 17h.01"/>
        </svg>

        <svg *ngIf="item.icon === 'empresas'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>

        <span>{{ item.label }}</span>
      </a>
    </ng-container>
  </nav>

  <!-- Logout -->
  <div class="px-3 py-4 border-t border-white border-opacity-10">
    <button
      (click)="logout()"
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-blue-200 hover:bg-red-500 hover:bg-opacity-20 hover:text-red-300 transition-all duration-200 text-sm font-medium">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      <span>Sair</span>
    </button>
  </div>
</aside>
